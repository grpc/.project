    path: "https://github.com/grpc/grpc/blob/master/LICENSE"
  identity_type:
    has_dco: false
    has_cla: true
    cla_only: true
    cla_url:
      path: "https://identity.linuxfoundation.org/projects/cncf"

documentation:
